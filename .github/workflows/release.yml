name: Release on tag

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-build.txt

      - name: Verify tag matches backend/version.py
        shell: pwsh
        run: |
          $content = Get-Content backend/version.py -Raw
          if (-not ($content -match 'VERSION\s*=\s*"([0-9]+\.[0-9]+\.[0-9]+)"')) {
            throw "No se pudo leer VERSION desde backend/version.py"
          }
          $codeVersion = $matches[1]
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          if ($codeVersion -ne $tagVersion) {
            throw "El tag $tagVersion no coincide con backend/version.py ($codeVersion)"
          }

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Build executable
        shell: pwsh
        run: ./build.ps1 -PythonExe python

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            LimpiarAxess.exe
