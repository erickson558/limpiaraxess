name: Release on main push

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build executable
        shell: pwsh
        run: ./build.ps1 -PythonExe python

      - name: Read version from code
        id: version
        shell: pwsh
        run: |
          $content = Get-Content backend/version.py -Raw
          if ($content -match 'VERSION\s*=\s*"([0-9]+\.[0-9]+\.[0-9]+)"') {
            $version = $matches[1]
            "version=$version" >> $env:GITHUB_OUTPUT
            "tag=v$version" >> $env:GITHUB_OUTPUT
          } else {
            throw "No se pudo leer VERSION desde backend/version.py"
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            LimpiarAxess.exe
